name: Build & Push Docker Image

on:
  workflow_dispatch:   # manual "Run workflow" button in GitHub UI

  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "package*.json"
      - "tsconfig.json"
      - ".github/workflows/docker-build.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nulp-ai-enterprise/printer-proxy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated deployment.yaml back to repo
      packages: write   # needed to push image to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Update deployment.yaml with the exact SHA tag so Argo CD sees a Git
      # diff and triggers a rollout — "latest" alone would not cause a sync.
      - name: Pin image SHA in deployment.yaml
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          NEW_IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"
          sed -i "s|image: ghcr.io/${{ env.IMAGE_NAME }}:.*|image: ${NEW_IMAGE}|" k8s/deployment.yaml
          echo "Pinned image → ${NEW_IMAGE}"

      - name: Commit updated deployment.yaml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          # Only commit if there is actually a change; [skip ci] prevents
          # this commit from re-triggering the workflow (infinite loop guard).
          git diff --staged --quiet || \
            git commit -m "chore: pin image to sha-$(echo '${{ github.sha }}' | cut -c1-7) [skip ci]"
          git push
